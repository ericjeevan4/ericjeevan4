name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ericjeevan4
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ericjeevan4
          output_path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: tokyonight
          row: 1
          column: 7
          no-bg: true
          no-frame: true
          margin-w: 4

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
